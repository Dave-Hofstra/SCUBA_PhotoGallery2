# SCUBA Photo Gallery 2 - nginx configuration
#
# Add this inside the server block of your existing nginx config
# (e.g., /etc/nginx/sites-enabled/scuba_combined)
#
# Steps:
#   1. sudo nano /etc/nginx/sites-enabled/scuba_combined
#   2. Add the location blocks below inside the existing server { } block
#   3. sudo nginx -t
#   4. sudo systemctl reload nginx

    # --- NEW: SCUBA Photo Gallery 2 Frontend ---
    location /SCUBA_PhotoGallery2 {
        alias /mnt/ServerDocs/Websites/SCUBA_PhotoGallery2/client/dist;
        index index.html;

        # For SPA routing: if file not found, serve index.html
        try_files $uri $uri/ /SCUBA_PhotoGallery2/index.html;
    }

    # --- NEW: SCUBA Photo Gallery 2 API Reverse Proxy ---
    location /SCUBA_PhotoGallery2/api/ {
        # Strip the /SCUBA_PhotoGallery2 prefix before passing to backend
        rewrite ^/SCUBA_PhotoGallery2/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- NEW: SCUBA Photo Gallery 2 Cache (thumbnails/display images) ---
    location /SCUBA_PhotoGallery2/cache/ {
        alias /mnt/ServerDocs/Websites/SCUBA_PhotoGallery2/cache/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- NEW: SCUBA Photo Gallery 2 Photos (original images if served) ---
    location /SCUBA_PhotoGallery2/photos/ {
        alias /mnt/ServerDocs/Websites/SCUBA_PhotoGallery2/photos/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }


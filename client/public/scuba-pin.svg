<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" width="64" height="80" role="img" aria-label="Scuba dive site map pin">
  <defs>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Pin body -->
  <path
    d="M32 76 C32 76 8 45 8 28 C8 14.745 18.745 4 32 4 C45.255 4 56 14.745 56 28 C56 45 32 76 32 76 Z"
    fill="#8B140E"
    filter="url(#shadow1)"
  />

  <!-- Inner round flag face -->
  <circle cx="32" cy="28" r="22" fill="#E11913"/>

  <!-- White scuba flag stripe -->
  <path
    d="M15.7 13.2 L50.8 42.5 L45.7 48.6 L10.6 19.3 Z"
    fill="#FFF9E8"
  />

  <!-- Gloss highlight -->
  <path
    d="M15 25 C17 13 27 8 38 10 C27 11 18 17 15 25 Z"
    fill="#FFFFFF"
    opacity="0.18"
  />

  <!-- Border -->
  <path
    d="M32 76 C32 76 8 45 8 28 C8 14.745 18.745 4 32 4 C45.255 4 56 14.745 56 28 C56 45 32 76 32 76 Z"
    fill="none"
    stroke="#5E0D09"
    stroke-width="3"
  />
</svg>
